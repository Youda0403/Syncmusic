<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyncRoom</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">

<header>
  <div class="logo">Sync<span>Room</span></div>
  <div id="roomBadge" style="display:none" class="room-pill">
    <span class="live-dot"></span>
    <span id="roomCodeDisplay"></span>
  </div>
</header>

<!-- LANDING -->
<div id="landing">
  <div class="cards">
    <div class="card">
      <span class="card-label">방장</span>
      <h2>방 만들기</h2>
      <p style="font-size:13px;color:var(--ink2);line-height:1.6">6자리 코드를 친구에게 공유하세요</p>
      <button class="btn btn-primary" onclick="createRoom()">방 만들기 →</button>
    </div>
    <div class="card">
      <span class="card-label">게스트</span>
      <h2>방 입장</h2>
      <input type="text" class="code-input" id="joinInput" placeholder="ABC123" maxlength="6">
      <button class="btn btn-outline" onclick="joinRoom()">입장하기 →</button>
    </div>
  </div>
  <div id="connStatus"></div>
</div>

<!-- ROOM -->
<div id="room">
  <div id="ytMount" class="yt-hidden"></div>

  <!-- PLAYER -->
  <div class="player-card">
    <div class="player-display">
      <div class="album-art">
        <span class="def-icon" id="defIcon">♪</span>
        <img id="albumImg" style="display:none" alt="">
      </div>
      <div class="track-meta">
        <div class="t-title" id="trackTitle"><span class="t-idle">재생할 곡을 선택하세요</span></div>
        <div class="t-sub" id="trackSub" style="display:none">YouTube</div>
      </div>
      <div class="peer-chip" id="peerChip">연결 중...</div>
    </div>

    <div class="player-error" id="playerError">
      ⚠️ 이 영상은 외부 재생이 차단되어 있어요. 다른 링크를 시도해보세요.
    </div>

    <div class="controls">
      <div class="prog-row">
        <span class="time-lbl" id="timeCur">0:00</span>
        <input type="range" id="progressBar" min="0" max="100" value="0" step="0.1">
        <span class="time-lbl r" id="timeDur">0:00</span>
      </div>
      <div class="ctrl-row">
        <div class="play-btns">
          <!-- 이전 곡 -->
          <button class="btn btn-ghost btn-sm" id="btnPrev" onclick="hostCmd('prev')" title="이전 곡">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <!-- 재생/정지 (방장+게스트 공통) -->
          <button class="btn-play" id="btnPlay" onclick="handlePlay()" disabled>
            <svg id="iconPlay" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="iconPause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <!-- 동기화 버튼 (게스트 전용, 처음 입장 시) -->
          <button class="btn-sync" id="btnSync" onclick="guestSync()">동기화</button>
          <!-- 다음 곡 -->
          <button class="btn btn-ghost btn-sm" id="btnNext" onclick="hostCmd('next')" title="다음 곡">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="transform:scaleX(-1)"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <!-- 반복 (방장 전용) -->
          <button class="btn btn-ghost btn-sm" id="btnRepeat" onclick="toggleRepeat()" title="반복 없음" style="opacity:.4;display:none">
            <svg id="iconRepeatNone" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            <svg id="iconRepeatOne"  width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/></svg>
            <svg id="iconRepeatAll"  width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
          </button>
        </div>
        <div class="vol-row">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          <input type="range" id="volBar" min="0" max="100" value="80">
          <span class="vol-lbl" id="volLabel">80%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-grid">
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">플레이리스트</span>
        <span id="trackCount" style="font-size:12px;color:var(--ink2)">0곡</span>
      </div>
      <div class="playlist-list" id="playlistEl"></div>
    </div>

    <div class="side-col">
      <!-- 곡 추가 -->
      <div class="panel">
        <div class="panel-head"><span class="panel-title">곡 추가</span></div>
        <div class="add-form" id="addForm">
          <input type="url" id="ytUrl" placeholder="https://youtube.com/watch?v=...">
          <input type="text" id="ytTitle" placeholder="곡 제목 (선택)">
          <button class="btn btn-accent btn-sm" onclick="addTrack()">＋ 추가</button>
        </div>
        <div class="guest-lock" id="guestLock">🔒 곡 추가/삭제는 방장만 가능해요</div>
      </div>

      <!-- 참여자 -->
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">참여자</span>
          <span id="memberCount" style="font-size:12px;color:var(--ink2)">0명</span>
        </div>
        <div class="member-list" id="memberList"></div>
      </div>

      <!-- 방 설정 -->
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">방 설정</span>
          <span id="roleChip" class="peer-chip"></span>
        </div>
        <div class="room-actions">
          <div class="action-row">
            <button class="btn btn-outline btn-sm" onclick="exportList()">📤 내보내기</button>
            <button class="btn btn-outline btn-sm" onclick="document.getElementById('importEl').click()">📥 불러오기</button>
            <input type="file" id="importEl" accept=".json" style="display:none" onchange="importList(event)">
          </div>
          <button class="btn btn-ghost btn-sm" onclick="copyCode()">🔗 코드 복사</button>
          <button class="btn btn-ghost btn-sm" id="miniBtn" onclick="openMiniPlayer()">🎵 미니 플레이어</button>
          <button class="btn btn-ghost btn-sm" id="leaveBtn" onclick="confirmLeave()" style="color:var(--accent)">나가기</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalMsg"></p>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="modalOk">확인</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="app.js"></script>
</body>
</html>
